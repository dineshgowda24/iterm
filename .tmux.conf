# ~/.tmux.conf — dineshgowda24/iterm
#
# Minimum-viable, opinionated tmux config.
# Full walkthrough of each setting lives in the Obsidian vault at cs/tmux.md.

# =============================================================================
# Prefix — Ctrl-a instead of Ctrl-b
# =============================================================================
# Easier reach on QWERTY, screen-compatible. Third line lets you send a
# literal Ctrl-a to inner processes by pressing prefix twice.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# Splits + new window inherit current pane's directory
# =============================================================================
# `|` = vertical divider (panes side-by-side); `-` = horizontal divider
# (panes stacked). Matches the visual, unlike tmux's default `"` and `%`.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window   -c "#{pane_current_path}"

# =============================================================================
# 1-indexed windows and panes (matches keyboard number row)
# =============================================================================
set  -g base-index 1
setw -g pane-base-index 1

# =============================================================================
# Mouse mode — scroll, click-to-focus, drag-to-resize
# =============================================================================
# Tradeoff: terminal's native scroll no longer works; tmux captures it.
set -g mouse on

# =============================================================================
# Scrollback — 50k lines per pane
# =============================================================================
# Default 2000 is nothing for docker logs, build output, long test runs.
set -g history-limit 50000

# =============================================================================
# Faster ESC — matters for vim
# =============================================================================
# Default 500ms makes vim's mode-switching feel awful. 10ms is safe on any
# modern terminal.
set -sg escape-time 10

# =============================================================================
# True color
# =============================================================================
# Advertise 24-bit truecolor support to programs running inside tmux.
# Without this, colors are quantized to the 256-color palette.
set -ga terminal-overrides ",xterm-256color:Tc"

# =============================================================================
# Reload config with prefix r (no tmux restart needed)
# =============================================================================
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"
